<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Student Registraion Form</title>
    <link rel="stylesheet" href="./style.css">
  </head>
  <body>
    <div>
      <header>
        <h1>Student Registraion Form</h1>
      </header>
    </div>

    <div>
      <main>
        <form action="">
          <label for="">Full Name:</label>
          <br />
          <input type="text" placeholder="Enter your name" required />
          <br />
          <br />
          <label for="">Email:</label>
          <br />
          <input type="email" placeholder="Enter your email" required />
          <br />
          <br />
          <label for="">Password:</label>
          <br />
          <input type="password" required />
          <br />
          <br />
          <label for="">Gender:</label>
          <br />
          <label for="male"
            ><input type="radio" name="gender" id="male" required />Male</label
          >
          <label for="female"
            ><input
              type="radio"
              name="gender"
              id="female"
              required
            />Female</label
          >
          <br />
          <br />
          <label for="">Skills:</label>
          <br />
          <label for="html"
            ><input type="checkbox" name="Skills" id="html" />HTML</label
          >
          <label for="css"
            ><input type="checkbox" name="Skills" id="css" />CSS</label
          >
          <label for="js"
            ><input type="checkbox" name="Skills" id="js" />JavaScript</label
          >
          <br />
          <br />
          <label for="">Date of Birth:</label>
          <br />
          <input type="date" required />
          <br />
          <br />
          <button type="submit">Register</button>
        </form>
      </main>
    </div>

    <hr />

    <div>
      <header>
        <h1>Submitted Students(Dummy Data)</h1>
      </header>
    </div>

    <div>
      <main>
        <table border="2" cellpadding="10">
          <tr>
            <th>Name</th>
            <th>Email</th>
            <th>Gender</th>
            <th>Skills</th>
            <th>DOB</th>
          </tr>
          <tr>
            <td>Alice</td>
            <td>alice@example.com</td>
            <td>Female</td>
            <td>HTML,CSS</td>
            <td>2002-05-10</td>
          </tr>
          <tr>
            <td>Bob</td>
            <td>bobe@example.com</td>
            <td>Male</td>
            <td>JavaScript</td>
            <td>2001-11-22</td>
          </tr>
        </table>
      </main>
    </div>
  </body>
</html>
